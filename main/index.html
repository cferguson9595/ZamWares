<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="stylesheet.css" />
    <title>ZamWares Home Page</title>
  </head>

  <body>
    <img src="./assets/images/logoSmall.png" alt="ZamWares Logo" aria-label="ZamWares Logo with eagle" width=150>
    <h1>Shop Local, Shop Zambia</h1>
    <main>
      <section class="banner">
        <p class="banner-option">
          <label for="item-category">Item Categories</label>
          <select name="item-category" id="item-category">
            <option value="clothing">Clothing</option>
            <option value="furniture">Furniture</option>
            <option value="decoration">Decorations</option>
          </select>
          <label for="search-bar">Search Bar</label>
          <input id="search-bar" name="search-bar" placeholder="What are you looking for?" type="text">
          <button for="search-bar" type="submit" name="submit" aria-label="Search">Search</button>
          <a id="login" href="./login.html">Login</a>
        </p>
      </section>
      
    </main>
  </body>

  <foot>
    <p class="footer">
      <a href="./contact.html">Contact Us</a>
      <a href="./about.html">About Us</a>
    </p>
    
  </foot>
</html>
